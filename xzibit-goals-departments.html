<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, initial-scale=1.0">
    <title>Xzibit Department Goals 2025-26</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #080c18;
            --surface: #0f1628;
            --surface2: #161d35;
            --border: rgba(255,255,255,0.07);
            --blue: #00CFFF;
            --gold: #FFD13A;
            --green: #00E887;
            --orange: #FF8C1A;
            --red: #FF4455;
            --text: #E8EEFF;
            --textdim: #7A84A8;
        }
        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: 'Barlow', sans-serif;
        }
        .dashboard {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 50px;
            height: 80px;
            background: linear-gradient(90deg, var(--surface) 0%, rgba(15,22,40,0.8) 100%);
            border-bottom: 2px solid var(--blue);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .logo-x {
            width: 50px;
            height: 50px;
            background: var(--blue);
            color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 36px;
            font-weight: 900;
            border-radius: 6px;
        }
        .header-text h1 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .header-text p {
            font-size: 11px;
            color: var(--blue);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .header-right {
            text-align: right;
        }
        .season {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 2px;
        }
        .updated {
            font-size: 11px;
            color: var(--textdim);
            margin-top: 2px;
        }
        .body {
            flex: 1;
            padding: 40px 50px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .dept-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            height: 100%;
        }
        .dept-header {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .dept-name-large {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--blue);
        }
        .dept-stats {
            display: flex;
            gap: 30px;
        }
        .dept-stat {
            text-align: right;
        }
        .dept-stat-label {
            font-size: 12px;
            color: var(--textdim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .dept-stat-value {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 28px;
            font-weight: 900;
            color: var(--green);
        }
        .goals-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .goal-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .goal-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            border-radius: 10px 0 0 10px;
        }
        .goal-number {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 12px;
            font-weight: 700;
            color: var(--textdim);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .goal-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.3;
            color: var(--text);
        }
        .goal-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: auto;
        }
        .status-completed { background: rgba(0,232,135,0.15); color: var(--green); border: 1px solid rgba(0,232,135,0.3); }
        .status-ontrack { background: rgba(0,207,255,0.15); color: var(--blue); border: 1px solid rgba(0,207,255,0.3); }
        .status-atrisk { background: rgba(255,209,58,0.15); color: var(--gold); border: 1px solid rgba(255,209,58,0.3); }
        .status-offtrack { background: rgba(255,68,85,0.15); color: var(--red); border: 1px solid rgba(255,68,85,0.3); }
        .status-notstarted { background: rgba(255,140,26,0.15); color: var(--orange); border: 1px solid rgba(255,140,26,0.3); }
        .status-airisk { background: rgba(122,106,138,0.15); color: #9A8AB3; border: 1px solid rgba(122,106,138,0.3); }
        .navigation {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }
        .nav-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--surface2);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .nav-dot.active {
            background: var(--blue);
            width: 24px;
            border-radius: 5px;
        }
        .transition-enter {
            animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <div class="logo-x">X</div>
                <div class="header-text">
                    <h1>Xzibit</h1>
                    <p>Imagination Captured</p>
                </div>
            </div>
            <div style="flex: 1; text-align: center;">
                <h1 style="font-size: 24px; letter-spacing: 3px; text-transform: uppercase; color: var(--textdim);">Department Goals</h1>
            </div>
            <div class="header-right">
                <div class="season">2025–26</div>
                <div class="updated" id="updated">Updated now</div>
            </div>
        </div>

        <!-- Body -->
        <div class="body">
            <div class="dept-container" id="deptContainer"></div>
        </div>
    </div>

    <script>
        const CONFIG = {
            goalsSheetUrl: 'https://docs.google.com/spreadsheets/d/1VumQnhFi2siIvaWHPZ1LuMdFiqI6ifjS_sHJIAKRi4c/export?format=csv&gid=368453036'
        };

        const DEPARTMENTS = ['AV', 'Design', 'Expo', 'Finance', 'People, Culture & Performance', 'Permanent', 'Production', 'Systems', 'Warehouse'];
        let departmentGoals = {};
        let currentDeptIndex = 0;

        async function fetchData() {
            try {
                const goalsData = await fetch(CONFIG.goalsSheetUrl).then(r => r.text());
                parseGoalsData(goalsData);
                renderDashboard();
                startCarousel();
            } catch (error) {
                console.error('Error fetching data:', error);
                // Render with whatever data we have (shows placeholder if empty)
                renderDashboard();
                if (!window.carouselInterval) startCarousel();
            }
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    if (inQuotes && line[i+1] === '"') { current += '"'; i++; }
                    else { inQuotes = !inQuotes; }
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            return result;
        }

        function parseGoalsData(csv) {
            const lines = csv.split('\n');
            departmentGoals = {};

            lines.forEach((line, idx) => {
                if (idx > 0 && line.trim()) {
                    const cols = parseCSVLine(line);
                    const dept = cols[0].trim();
                    const goal = cols[1].trim();
                    const status = cols[5].trim() || 'Not Started';

                    if (!departmentGoals[dept]) {
                        departmentGoals[dept] = [];
                    }

                    if (departmentGoals[dept].length < 3) {
                        departmentGoals[dept].push({
                            title: goal,
                            status: status,
                            number: departmentGoals[dept].length + 1
                        });
                    }
                }
            });
        }

        function renderDashboard() {
            const container = document.getElementById('deptContainer');
            const dept = DEPARTMENTS[currentDeptIndex];
            const goals = departmentGoals[dept] || [];
            const completed = goals.filter(g => g.status.includes('Completed')).length;
            const hasData = Object.keys(departmentGoals).length > 0;

            let html = `
                <div class="dept-header">
                    <div class="dept-name-large">${dept}</div>
                    <div class="dept-stats">
                        <div class="dept-stat">
                            <div class="dept-stat-label">Goals Completed</div>
                            <div class="dept-stat-value">${hasData ? completed + '/3' : '\u2014'}</div>
                        </div>
                    </div>
                </div>
            `;

            html += '<div class="goals-grid">';
            if (!hasData) {
                html += `<div class="goal-card" style="grid-column:1/-1;align-items:center;justify-content:center;min-height:180px;">
                    <div class="goal-title" style="color:var(--textdim);text-align:center;font-size:16px;">Connecting to Google Sheets…</div>
                    <div style="font-size:12px;color:var(--textdim);margin-top:8px;text-align:center;">Auto-refreshes every 15 minutes</div>
                </div>`;
            } else {
                goals.forEach(goal => {
                    const statusClass = getStatusClass(goal.status);
                    const statusIcon = getStatusIcon(goal.status);
                    html += `
                        <div class="goal-card transition-enter">
                            <div class="goal-number">Goal ${goal.number}</div>
                            <div class="goal-title">${goal.title}</div>
                            <div class="goal-status ${statusClass}">${statusIcon} ${goal.status}</div>
                        </div>
                    `;
                });
            }
            html += '</div>';

            // Navigation dots
            html += '<div class="navigation">';
            DEPARTMENTS.forEach((d, idx) => {
                const activeClass = idx === currentDeptIndex ? 'active' : '';
                html += `<div class="nav-dot ${activeClass}" onclick="goToDepartment(${idx})"></div>`;
            });
            html += '</div>';

            container.innerHTML = html;
            updateTimestamp();
        }

        function getStatusClass(status) {
            if (status.includes('Completed')) return 'status-completed';
            if (status.includes('On Track')) return 'status-ontrack';
            if (status.includes('At Risk')) return 'status-atrisk';
            if (status.includes('Off Track')) return 'status-offtrack';
            if (status.includes('AI Risk')) return 'status-airisk';
            return 'status-notstarted';
        }

        function getStatusIcon(status) {
            if (status.includes('Completed')) return '✓';
            if (status.includes('On Track')) return '→';
            if (status.includes('At Risk')) return '⚠';
            if (status.includes('Off Track')) return '✕';
            if (status.includes('AI Risk')) return '!';
            return '◯';
        }

        function goToDepartment(idx) {
            currentDeptIndex = idx;
            renderDashboard();
            clearInterval(window.carouselInterval);
            startCarousel();
        }

        function startCarousel() {
            window.carouselInterval = setInterval(() => {
                currentDeptIndex = (currentDeptIndex + 1) % DEPARTMENTS.length;
                renderDashboard();
            }, 10000);
        }

        function updateTimestamp() {
            const now = new Date();
            const opts = { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: true };
            document.getElementById('updated').textContent = 'Updated ' + now.toLocaleDateString('en-US', opts);
        }

        fetchData();
        setInterval(() => {
            fetchData();
        }, 900000);
    </script>
</body>
</html>
