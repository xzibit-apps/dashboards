<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, initial-scale=1.0">
    <title>Xzibit Department Goals 2025-26</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg:      #05080f;
            --surface: #0c1222;
            --surf2:   #111827;
            --border:  rgba(255,255,255,0.08);
            --blue:    #00CFFF;
            --gold:    #FFD13A;
            --green:   #00E887;
            --orange:  #FF8C1A;
            --red:     #FF4455;
            --purple:  #9A7AB3;
            --text:    #FFFFFF;
            --dim:     #8896B0;
        }
        html, body {
            width: 100vw; height: 100vh;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: 'Barlow', sans-serif;
        }
        .dashboard { width: 100%; height: 100%; display: flex; flex-direction: column; }

        /* ── HEADER ── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            height: 80px;
            background: var(--surface);
            border-bottom: 3px solid var(--border);
            flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .logo-x {
            width: 50px; height: 50px;
            background: var(--blue); color: #000;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 32px; font-weight: 900; border-radius: 6px; flex-shrink: 0;
        }
        .header-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 15px; font-weight: 700;
            letter-spacing: 4px; text-transform: uppercase; color: var(--dim);
        }
        .dept-headline {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 40px; font-weight: 900;
            letter-spacing: 2px; text-transform: uppercase;
            line-height: 1;
            transition: opacity 0.3s;
        }
        .header-center {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
        }
        .progress-ticker {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--surf2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 24px;
        }
        .ticker-value {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 32px; font-weight: 900;
            transition: opacity 0.3s;
        }
        .ticker-label { font-size: 13px; color: var(--dim); }
        .header-right { text-align: right; flex-shrink: 0; }
        .season { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; color: var(--gold); letter-spacing: 2px; }
        @keyframes freshness-pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.35; }
        }
        .updated {
            font-size: 11px; color: var(--dim); margin-top: 3px;
            display: flex; align-items: center; gap: 6px; justify-content: flex-end;
        }
        .updated::before {
            content: ''; display: inline-block;
            width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
            background: var(--dim);
        }
        .updated.fresh::before  { background: var(--green); }
        .updated.stale::before  { background: var(--gold);  animation: freshness-pulse 2s ease-in-out infinite; }
        .updated.broken::before { background: var(--red);   animation: freshness-pulse 1.5s ease-in-out infinite; }

        /* ── DEPT BANNER (dept-specific accent) ── */
        .dept-banner {
            height: 6px;
            transition: background 0.4s;
            flex-shrink: 0;
        }

        /* ── 3 GOAL CARDS ── */
        .cards-row {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0;
            overflow: hidden;
        }
        .goal-card {
            display: flex;
            flex-direction: column;
            padding: 32px 36px;
            border-right: 1px solid var(--border);
            position: relative;
            transition: border-left-color 0.4s;
            border-left: 4px solid transparent;
        }
        .goal-card:last-child { border-right: none; }

        .goal-number {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 13px; font-weight: 700;
            letter-spacing: 4px; text-transform: uppercase;
            color: var(--dim); margin-bottom: 16px;
        }
        .goal-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 30px; font-weight: 800;
            line-height: 1.2;
            flex: 1;
            margin-bottom: 24px;
        }
        .goal-note {
            font-size: 14px;
            color: var(--dim);
            line-height: 1.5;
            margin-bottom: 24px;
        }
        .goal-status-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            border-radius: 8px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 20px; font-weight: 900;
            letter-spacing: 2px; text-transform: uppercase;
            border: 2px solid transparent;
            align-self: flex-start;
        }
        .badge-icon { font-size: 20px; }

        /* Status badge colours */
        .s-completed  { background: rgba(0,232,135,0.12); color: #00E887; border-color: rgba(0,232,135,0.35); }
        .s-ontrack    { background: rgba(0,207,255,0.12); color: #00CFFF; border-color: rgba(0,207,255,0.35); }
        .s-atrisk     { background: rgba(255,209,58,0.12); color: #FFD13A; border-color: rgba(255,209,58,0.35); }
        .s-offtrack   { background: rgba(255,68,85,0.12);  color: #FF4455; border-color: rgba(255,68,85,0.35); }
        .s-airisk     { background: rgba(154,122,179,0.12); color: #9A7AB3; border-color: rgba(154,122,179,0.35); }
        .s-notstarted { background: rgba(255,255,255,0.05); color: #8896B0; border-color: rgba(255,255,255,0.15); }

        /* Card left border by status */
        .goal-card.s-completed  { border-left-color: #00E887; }
        .goal-card.s-ontrack    { border-left-color: #00CFFF; }
        .goal-card.s-atrisk     { border-left-color: #FFD13A; }
        .goal-card.s-offtrack   { border-left-color: #FF4455; }
        .goal-card.s-airisk     { border-left-color: #9A7AB3; }
        .goal-card.s-notstarted { border-left-color: rgba(255,255,255,0.15); }

        /* Placeholder when no data */
        .placeholder-card {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
            color: var(--dim);
        }
        .placeholder-card .ph-icon { font-size: 36px; opacity: 0.4; }
        .placeholder-card .ph-text { font-size: 14px; }

        /* ── BOTTOM: STATUS BAR + NAV ── */
        .bottom-section {
            flex-shrink: 0;
            background: var(--surface);
            border-top: 2px solid var(--border);
        }
        .status-bar-wrap {
            padding: 16px 48px 12px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .sb-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 12px; font-weight: 700;
            letter-spacing: 3px; text-transform: uppercase;
            color: var(--dim); white-space: nowrap;
        }
        .sb-chart-wrap { flex: 1; height: 18px; position: relative; }
        .sb-legend {
            display: flex;
            gap: 16px;
            flex-shrink: 0;
        }
        .sb-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--dim); }
        .sb-dot { width: 10px; height: 10px; border-radius: 2px; }
        .nav-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px 0 14px;
        }
        .nav-pill {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 14px; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase;
            padding: 6px 18px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--dim);
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .nav-pill.active { color: #000; font-weight: 900; }

        /* Fade transition */
        .fade-out { opacity: 0; transition: opacity 0.25s; }
        .fade-in  { opacity: 1; transition: opacity 0.25s; }
    </style>
</head>
<body>
<div class="dashboard">

    <!-- HEADER -->
    <div class="header">
        <div class="header-left">
            <div class="logo-x">X</div>
            <div>
                <div class="header-title">Department Goals</div>
                <div class="dept-headline" id="dept-name">Loading…</div>
            </div>
        </div>

        <div class="header-center">
            <div class="progress-ticker">
                <div class="ticker-value" id="dept-score" style="color:var(--green)">—</div>
                <div>
                    <div class="ticker-label">Goals Completed</div>
                    <div class="ticker-label" id="dept-rank" style="margin-top:3px;">—</div>
                </div>
            </div>
        </div>

        <div class="header-right">
            <div class="season">2025–26</div>
            <div class="updated" id="updated">Updating…</div>
        </div>
    </div>

    <!-- DEPT COLOUR ACCENT BAR -->
    <div class="dept-banner" id="dept-banner"></div>

    <!-- 3 GOAL CARDS -->
    <div class="cards-row" id="cards-row">
        <!-- rendered by JS -->
    </div>

    <!-- BOTTOM: STATUS BAR + NAV -->
    <div class="bottom-section">
        <div class="status-bar-wrap">
            <div class="sb-label">This Dept</div>
            <div class="sb-chart-wrap">
                <canvas id="deptDistChart"></canvas>
            </div>
            <div class="sb-legend" id="sb-legend"></div>
        </div>
        <div class="nav-row" id="nav-row"></div>
    </div>

</div><!-- /dashboard -->

<script>
    const CONFIG = {
        goalsSheetUrl: 'https://docs.google.com/spreadsheets/d/1VumQnhFi2siIvaWHPZ1LuMdFiqI6ifjS_sHJIAKRi4c/export?format=csv&gid=368453036'
    };

    const DEPARTMENTS = ['AV','Design','Expo','Finance','People, Culture & Performance','Permanent','Production','Systems','Warehouse'];
    const DEPT_SHORT = {
        'AV':                            'AV',
        'Design':                        'Design',
        'Expo':                          'Expo',
        'Finance':                       'Finance',
        'People, Culture & Performance': 'P&C',
        'Permanent':                     'Perm',
        'Production':                    'Prod',
        'Systems':                       'Sys',
        'Warehouse':                     'WH'
    };

    const MGN_FLOOR       = 31.7; // FALLBACK — overridden by sheet parse
    const MGN_STRETCH     = 33.7; // FALLBACK — overridden by sheet parse
    const GOALS_THRESHOLD = 14;   // FALLBACK — overridden by sheet parse

    const STATUS_META = {
        'Completed':   { cls: 's-completed',  icon: '\u2713', color: '#00E887' },
        'On Track':    { cls: 's-ontrack',    icon: '\u2713', color: '#00CFFF' },
        'At Risk':     { cls: 's-atrisk',     icon: '\u26A0', color: '#FFD13A' },
        'Off Track':   { cls: 's-offtrack',   icon: '\u2717', color: '#FF4455' },
        'AI Risk':     { cls: 's-airisk',     icon: '!',       color: '#9A7AB3' },
        'Not Started': { cls: 's-notstarted', icon: '\u25CB', color: '#334155' }
    };

    function ordinal(n) {
        const s = ['th','st','nd','rd'];
        const v = n % 100;
        return n + (s[(v - 20) % 10] || s[v] || s[0]);
    }

    function computeRanks() {
        const sorted = DEPARTMENTS.slice().sort((a, b) => {
            const ca = (allGoals[a] || []).filter(g => g.status === 'Completed').length;
            const cb = (allGoals[b] || []).filter(g => g.status === 'Completed').length;
            return cb !== ca ? cb - ca : a.localeCompare(b);
        });
        const ranks = {};
        sorted.forEach((dept, i) => { ranks[dept] = i + 1; });
        return ranks;
    }

    function deptAccentColor(goals) {
        if (!goals.length) return '#334155';
        const comp = goals.filter(g => g.status === 'Completed').length;
        if (comp === 3) return '#00E887';
        if (goals.some(g => g.status === 'Off Track')) return '#FF4455';
        if (goals.some(g => g.status === 'At Risk'))   return '#FFD13A';
        if (goals.some(g => g.status === 'On Track'))  return '#00CFFF';
        return '#334155';
    }

    function getStatusKey(rawStatus) {
        if (!rawStatus) return 'Not Started';
        if (rawStatus.includes('Completed'))  return 'Completed';
        if (rawStatus.includes('Off Track'))  return 'Off Track';
        if (rawStatus.includes('On Track'))   return 'On Track';
        if (rawStatus.includes('At Risk'))    return 'At Risk';
        if (rawStatus.includes('AI Risk'))    return 'AI Risk';
        return 'Not Started';
    }

    let currentIdx = 0;
    let carouselTimer = null;
    let deptDistChart = null;
    let allGoals = {}; // dept → [{title, status, currentStatus, reviewDate, note, number}]

    // ── Data ─────────────────────────────────────────────────────────────────
    function parseCSVLine(line) {
        const result = []; let current = ''; let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            const c = line[i];
            if (c === '"') { if (inQuotes && line[i+1] === '"') { current += '"'; i++; } else { inQuotes = !inQuotes; } }
            else if (c === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
            else { current += c; }
        }
        result.push(current.trim());
        return result;
    }
    function parseNum(v) { return parseFloat(String(v).replace(/[$,%"]/g,'').trim()) || 0; }

    // ── Bonus formula ────────────────────────────────────────────────────────
    function computeBonus({ ytdActualIncome, incomeTarget, ytdMargin, marginFloor, marginStretch, goalsCompleted, goalsThreshold }) {
        const incomeBonus   = ytdActualIncome >= incomeTarget ? 1.0 : 0.0;
        const incomeSecured = incomeBonus === 1.0;
        let marginBonus;
        if (ytdMargin >= marginStretch)    marginBonus = 2.0;
        else if (ytdMargin >= marginFloor) marginBonus = 1.0 + ((ytdMargin - marginFloor) / (marginStretch - marginFloor));
        else                               marginBonus = 0.0;
        const marginSecured = false; // margin is never "secured" before EOFY
        const goalsBonus    = goalsCompleted >= goalsThreshold ? 2.0 : 0.0;
        const goalsSecured  = goalsBonus === 2.0;
        return {
            income: { earned: incomeBonus,  max: 1.0, secured: incomeSecured },
            margin: { earned: marginBonus,  max: 2.0, secured: marginSecured },
            goals:  { earned: goalsBonus,   max: 2.0, secured: goalsSecured },
            total:  { earned: incomeBonus + marginBonus + goalsBonus, max: 5.0 },
        };
    }

    function processGoals(csv) {
        const lines = csv.split('\n');
        let headerCols = [];
        allGoals = {};
        DEPARTMENTS.forEach(d => allGoals[d] = []);
        const allGoalsList = []; // flat list for window.gd

        lines.forEach((line, idx) => {
            if (idx === 0) { headerCols = parseCSVLine(line); return; }
            if (!line.trim()) return;
            const cols = parseCSVLine(line);
            const dept = (cols[0] || '').trim();
            if (!DEPARTMENTS.includes(dept)) return;
            if (allGoals[dept].length >= 3) return;

            const title = (cols[1] || 'Untitled goal').trim();

            // Scan cols[2]..cols[8] right-to-left for the latest non-empty review status
            let rawStatus = '', reviewDate = '';
            for (let ci = 8; ci >= 2; ci--) {
                const v = (cols[ci] || '').trim();
                if (v) { rawStatus = v; reviewDate = (headerCols[ci] || '').trim(); break; }
            }
            const statusKey = getStatusKey(rawStatus);
            // col[9] is "Notes from last meeting" — exposed on goal object, rendered in a later PR
            const note = (cols[9] || '').trim();

            const goalObj = {
                title,
                status:        statusKey,   // canonical key used for rendering
                currentStatus: rawStatus,   // raw value from sheet
                reviewDate,
                note,
                number: allGoals[dept].length + 1
            };
            allGoals[dept].push(goalObj);
            allGoalsList.push({ dept, ...goalObj });
        });

        // Bonus formula on window for dev console inspection — not surfaced in UI
        const totalCompleted = allGoalsList.filter(g => g.status === 'Completed').length;
        window.bonus = computeBonus({
            ytdActualIncome: 0,
            incomeTarget:    10342000,
            ytdMargin:       0,
            marginFloor:     MGN_FLOOR,
            marginStretch:   MGN_STRETCH,
            goalsCompleted:  totalCompleted,
            goalsThreshold:  GOALS_THRESHOLD,
        });
        window.gd = { goals: allGoalsList };
    }

    // ── Render ────────────────────────────────────────────────────────────────
    function renderDept(idx) {
        const dept  = DEPARTMENTS[idx];
        const goals = allGoals[dept] || [];
        const name  = DEPT_SHORT[dept] || dept;
        const comp  = goals.filter(g => g.status === 'Completed').length;

        const rank = computeRanks()[dept] || '?';

        set('dept-name', name);
        set('dept-score', comp + ' / ' + (goals.length || 3));
        set('dept-rank', 'RANKED ' + ordinal(rank) + ' OF ' + DEPARTMENTS.length);

        const scoreEl = document.getElementById('dept-score');
        if (scoreEl) scoreEl.style.color = comp === 3 ? 'var(--green)' : comp >= 1 ? 'var(--blue)' : 'var(--dim)';

        document.getElementById('dept-banner').style.background = deptAccentColor(goals);

        const hasData = goals.length > 0;
        document.getElementById('cards-row').innerHTML = hasData
            ? goals.map(g => renderCard(g)).join('')
            : renderPlaceholderCards();

        renderDeptDist(goals);
        renderNav(idx);


    }

    function renderCard(goal) {
        const sm = STATUS_META[goal.status] || STATUS_META['Not Started'];
        const noteHtml = goal.note && goal.note.trim()
            ? `<div class="goal-note">${goal.note.trim()}</div>`
            : `<div class="goal-note" style="display:none"></div>`;
        return `<div class="goal-card ${sm.cls}">
            <div class="goal-number">Goal ${goal.number}</div>
            <div class="goal-title">${goal.title}</div>
            ${noteHtml}
            <div class="goal-status-badge ${sm.cls}">
                <span class="badge-icon">${sm.icon}</span>
                <span>${goal.status}</span>
            </div>
        </div>`;
    }

    function renderPlaceholderCards() {
        return Array(3).fill(0).map((_, i) => `
            <div class="goal-card placeholder-card s-notstarted">
                <div class="ph-icon">\u25CB</div>
                <div class="ph-text">Goal ${i+1} \u2014 loading\u2026</div>
            </div>`).join('');
    }

    function renderDeptDist(goals) {
        if (deptDistChart) deptDistChart.destroy();
        const statusOrder = ['Completed','On Track','At Risk','Off Track','AI Risk','Not Started'];
        const counts = {};
        statusOrder.forEach(k => counts[k] = 0);
        goals.forEach(g => counts[g.status] = (counts[g.status] || 0) + 1);
        if (goals.length < 3) counts['Not Started'] += (3 - goals.length);

        const activeKeys = statusOrder.filter(k => counts[k] > 0);

        deptDistChart = new Chart(document.getElementById('deptDistChart'), {
            type: 'bar',
            data: {
                labels: [''],
                datasets: statusOrder.map(k => ({
                    label: k, data: [counts[k] || 0],
                    backgroundColor: STATUS_META[k]?.color || '#334155', borderRadius: 3
                }))
            },
            options: {
                indexAxis: 'y', responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { stacked: true, max: 3, display: false },
                    y: { stacked: true, display: false }
                }
            }
        });

        document.getElementById('sb-legend').innerHTML = activeKeys.map(k => `
            <div class="sb-item">
                <div class="sb-dot" style="background:${STATUS_META[k]?.color}"></div>
                <span>${k}: ${counts[k]}</span>
            </div>`).join('');
    }

    function renderNav(activeIdx) {
        document.getElementById('nav-row').innerHTML = DEPARTMENTS.map((dept, i) => {
            const label = DEPT_SHORT[dept] || dept;
            const isActive = i === activeIdx;
            const accent = isActive ? deptAccentColor(allGoals[dept] || []) : null;
            const style = isActive ? `background:${accent};border-color:${accent}` : '';
            return `<div class="nav-pill${isActive ? ' active' : ''}" onclick="goTo(${i})" style="${style}">${label}</div>`;
        }).join('');
    }

    function goTo(idx) {
        currentIdx = idx;
        renderDept(currentIdx);
        resetCarousel();
    }

    function resetCarousel() {
        if (carouselTimer) clearTimeout(carouselTimer);
        const goals = allGoals[DEPARTMENTS[currentIdx]] || [];
        const dwell = goals.some(g => g.status === 'Off Track') ? 15000 : 10000;
        carouselTimer = setTimeout(() => {
            currentIdx = (currentIdx + 1) % DEPARTMENTS.length;
            renderDept(currentIdx);
            resetCarousel();
        }, dwell);
    }

    function set(id, val) { const el = document.getElementById(id); if (el) el.textContent = val; }

    // ── Data freshness indicator ─────────────────────────────────────────────
    // TODO: extract freshness helper to shared/
    let lastSuccessAt = null;

    function renderFreshness(state, timestamp) {
        const el = document.getElementById('updated');
        if (!el) return;
        el.className = 'updated ' + state;
        if (state === 'fresh')       el.textContent = 'Updated ' + timestamp;
        else if (state === 'stale')  el.textContent = 'Updated ' + timestamp + ' · stale';
        else                         el.textContent = 'DATA STALE · check sheet access';
    }

    function updateFreshness() {
        if (!lastSuccessAt) { renderFreshness('broken', ''); return; }
        const age  = Date.now() - lastSuccessAt;
        const mins = age / 60000;
        const ts   = new Date(lastSuccessAt).toLocaleString('en-AU', {
            hour: '2-digit', minute: '2-digit', hour12: true
        });
        if      (mins < 20) renderFreshness('fresh',  ts);
        else if (mins < 45) renderFreshness('stale',  ts);
        else                renderFreshness('broken', ts);
    }

    async function fetchData() {
        try {
            const csv = await fetch(CONFIG.goalsSheetUrl).then(r => r.text());
            const isHtml = csv.trimStart().startsWith('<!DOCTYPE') || csv.trimStart().startsWith('<html');
            if (isHtml) {
                console.warn('[goals-depts] Goals sheet returned HTML — check that the Google Sheet is shared publicly');
            } else {
                processGoals(csv);
                const hasGoals = (window.gd?.goals || []).length > 0;
                if (hasGoals) lastSuccessAt = Date.now();
                else console.warn('[goals-depts] Parse returned no goal rows — not marking as fresh');
            }
        } catch (e) {
            console.error('[goals-depts] Fetch error:', e);
        }
        renderDept(currentIdx);
        updateFreshness();
    }

    fetchData();
    resetCarousel();
    setInterval(fetchData, 900000);
