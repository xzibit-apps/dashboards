<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, initial-scale=1.0">
    <title>Xzibit Team Goals 2025-26</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:        #080c18;
            --surface:   #0f1628;
            --surface2:  #161d35;
            --border:    rgba(255,255,255,0.07);
            --blue:      #00CFFF;
            --gold:      #FFD13A;
            --green:     #00E887;
            --orange:    #FF8C1A;
            --red:       #FF4455;
            --grey:      #5A6080;
            --text:      #E8EEFF;
            --textdim:   #7A84A8;
        }

        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: 'Barlow', sans-serif;
        }

        /* ── SLIDES ── */
        #slides-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        .slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.7s ease;
            pointer-events: none;
            display: flex;
            flex-direction: column;
        }

        .slide.active {
            opacity: 1;
            pointer-events: all;
        }

        /* ── HEADER ── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 60px;
            height: 90px;
            background: var(--surface);
            border-bottom: 2px solid var(--blue);
        }

        .header-logo-block {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-logo {
            width: 60px;
            height: 60px;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><path d="M50 50 L100 100 L50 150 M100 50 L150 100 L100 150" stroke="%2300CFFF" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .header-text {
            display: flex;
            flex-direction: column;
        }

        .header-company {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 4px;
            color: var(--text);
            text-transform: uppercase;
        }

        .header-subtitle {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 3px;
            color: var(--blue);
            text-transform: uppercase;
        }

        .header-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--textdim);
            flex: 1;
        }

        .header-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
        }

        .header-season {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--gold);
            text-transform: uppercase;
        }

        .header-updated {
            font-size: 13px;
            color: var(--textdim);
            letter-spacing: 1px;
        }

        /* ── SLIDE NAV DOTS ── */
        #nav-dots {
            position: fixed;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border);
            border: 1px solid var(--grey);
            transition: all 0.3s;
            cursor: pointer;
        }

        .dot.active { background: var(--blue); border-color: var(--blue); transform: scale(1.4); }

        /* ── DEPARTMENT SLIDES ── */
        .dept-slide .body {
            padding: 40px 60px 60px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            flex: 1;
        }

        .dept-hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .dept-name {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 72px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            line-height: 1;
        }

        .dept-lead {
            font-size: 20px;
            color: var(--textdim);
            margin-top: 4px;
            letter-spacing: 1px;
        }

        .dept-progress-summary {
            text-align: right;
        }

        .dept-score {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 80px;
            font-weight: 900;
            line-height: 1;
        }

        .dept-score-label {
            font-size: 16px;
            color: var(--textdim);
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: right;
        }

        .goals-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .goal-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px 32px;
            position: relative;
            overflow: hidden;
            min-height: 200px;
            display: flex;
            flex-direction: column;
        }

        .goal-card-accent {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }

        .goal-number {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--textdim);
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .goal-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 28px;
            font-weight: 700;
            line-height: 1.2;
            color: var(--text);
            flex: 1;
            margin-bottom: 20px;
        }

        .goal-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .goal-status-text {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .goal-icon {
            font-size: 32px;
        }

        /* ── COLOUR HELPERS ── */
        .c-blue   { color: var(--blue);   }
        .c-gold   { color: var(--gold);   }
        .c-green  { color: var(--green);  }
        .c-orange { color: var(--orange); }
        .c-red    { color: var(--red);    }
        .c-grey   { color: var(--grey);   }

        /* ── DEPT SLIDE COUNTER ── */
        .slide-counter {
            position: absolute;
            bottom: 50px;
            right: 60px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--textdim);
            text-transform: uppercase;
        }

        /* ── TICKER BAR ── */
        #ticker {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            overflow: hidden;
            z-index: 200;
        }

        #ticker-label {
            padding: 0 20px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--blue);
            text-transform: uppercase;
            border-right: 1px solid var(--border);
            white-space: nowrap;
        }

        #ticker-track {
            flex: 1;
            overflow: hidden;
        }

        #ticker-inner {
            display: flex;
            gap: 80px;
            animation: ticker-scroll 40s linear infinite;
            white-space: nowrap;
        }

        @keyframes ticker-scroll {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .ticker-item {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--textdim);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        /* ── SCANLINE TEXTURE ── */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.03) 2px,
                rgba(0,0,0,0.03) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }
    </style>
</head>
<body>

<div id="slides-container"></div>
<div id="nav-dots"></div>
<div id="ticker">
    <div id="ticker-label">📊 TEAM GOALS</div>
    <div id="ticker-track"><div id="ticker-inner"></div></div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
//  CONFIGURATION — UPDATE YOUR GOOGLE SHEETS URLs HERE
// ════════════════════════════════════════════════════════════════
const CONFIG = {
    slideIntervalMs:  12000,   // 12 seconds per slide
    goalsSheetUrl:    "YOUR_GOALS_CSV_URL_HERE",
    // Format: https://docs.google.com/spreadsheets/d/YOUR_SHEET_ID/export?format=csv&gid=SHEET_GID
};

// ════════════════════════════════════════════════════════════════
//  DEMO DATA
// ════════════════════════════════════════════════════════════════
const DEMO_DATA = [
    {
        name: "AV Department",
        lead: "Jay",
        goals: [
            { title: "Set Up & Implement SLA Framework",       status: "On Track"    },
            { title: "Improve Documentation & Recording (XTEN)", status: "On Track"  },
            { title: "Improve WIP System (Teamwork)",           status: "On Track"   },
        ]
    },
    {
        name: "Design",
        lead: "Sarah",
        goals: [
            { title: "Brand Guidelines v2",                     status: "Completed"   },
            { title: "Template Library",                        status: "On Track"   },
            { title: "Asset Management",                        status: "In Progress" },
        ]
    },
    {
        name: "Expo",
        lead: "Jamie",
        goals: [
            { title: "Expo Design Standards",                   status: "On Track"   },
            { title: "Graphics Tracker Implementation",         status: "On Track"   },
            { title: "Milestones Tracker",                      status: "On Track"   },
        ]
    },
    {
        name: "Finance",
        lead: "Lisa",
        goals: [
            { title: "Budget Forecasting",                      status: "On Track"   },
            { title: "Invoice Automation",                      status: "Completed"  },
            { title: "Reporting Suite",                         status: "On Track"   },
        ]
    },
    {
        name: "People & Culture",
        lead: "Emma",
        goals: [
            { title: "Training Program",                        status: "In Progress" },
            { title: "Engagement Surveys",                      status: "On Track"   },
            { title: "Career Pathways",                         status: "At Risk"    },
        ]
    },
    {
        name: "Permanent",
        lead: "Chris",
        goals: [
            { title: "Installation Process",                    status: "Completed"  },
            { title: "Quality Control",                         status: "On Track"   },
            { title: "Client Portal",                           status: "In Progress" },
        ]
    },
    {
        name: "Production",
        lead: "David",
        goals: [
            { title: "Capacity Planning",                       status: "On Track"   },
            { title: "Waste Reduction",                         status: "Completed"  },
            { title: "Efficiency Metrics",                      status: "On Track"   },
        ]
    },
    {
        name: "Systems",
        lead: "Alex",
        goals: [
            { title: "Network Security",                        status: "Completed"  },
            { title: "Cloud Migration",                         status: "In Progress" },
            { title: "Backup Strategy",                         status: "On Track"   },
        ]
    },
    {
        name: "Warehouse",
        lead: "Robert",
        goals: [
            { title: "Inventory System",                        status: "On Track"   },
            { title: "Picking Optimization",                    status: "In Progress" },
            { title: "Safety Protocols",                        status: "Completed"  },
        ]
    },
];

// ════════════════════════════════════════════════════════════════
//  STATUS CONFIG
// ════════════════════════════════════════════════════════════════
const STATUS = {
    "Completed":   { color: "var(--green)",  cls: "c-green",  icon: "✓" },
    "On Track":    { color: "var(--blue)",   cls: "c-blue",   icon: "●" },
    "In Progress": { color: "var(--gold)",   cls: "c-gold",   icon: "◐" },
    "At Risk":     { color: "var(--orange)", cls: "c-orange", icon: "⚠" },
    "Behind":      { color: "var(--red)",    cls: "c-red",    icon: "✕" },
    "Not Started": { color: "var(--grey)",   cls: "c-grey",   icon: "○" },
};

function getStatus(s) {
    return STATUS[s] || STATUS["Not Started"];
}

// ════════════════════════════════════════════════════════════════
//  BUILD DEPARTMENT SLIDE
// ════════════════════════════════════════════════════════════════
function buildDeptSlide(dept, idx, total) {
    const goals = dept.goals;
    const positive = goals.filter(g => ['Completed','On Track'].includes(g.status)).length;
    const scoreColor = positive === 3 ? 'c-green' : positive >= 2 ? 'c-blue' : positive === 1 ? 'c-gold' : 'c-grey';

    const goalsHTML = goals.map((g, i) => {
        const s = getStatus(g.status);
        return `
        <div class="goal-card">
            <div class="goal-card-accent" style="background:${s.color}"></div>
            <div class="goal-number">Goal ${i + 1}</div>
            <div class="goal-title">${g.title}</div>
            <div class="goal-footer">
                <div class="goal-status-text" style="color:${s.color}">${g.status}</div>
                <div class="goal-icon">${s.icon}</div>
            </div>
        </div>`;
    }).join('');

    return `
    <div class="header">
        <div class="header-logo-block">
            <div class="header-logo"></div>
            <div class="header-text">
                <div class="header-company">XZIBIT</div>
                <div class="header-subtitle">imagination captured</div>
            </div>
        </div>
        <div class="header-title">Department Goals</div>
        <div class="header-meta">
            <div class="header-season">2025–26</div>
            <div class="header-updated">EOFY Target · June 30 2026</div>
        </div>
    </div>
    <div class="body">
        <div class="dept-hero">
            <div>
                <div class="dept-name">${dept.name}</div>
                ${dept.lead ? `<div class="dept-lead">Lead: ${dept.lead}</div>` : ''}
            </div>
            <div class="dept-progress-summary">
                <div class="dept-score ${scoreColor}">${positive}<span style="font-size:40px;color:var(--textdim)">/3</span></div>
                <div class="dept-score-label">Goals On Track</div>
            </div>
        </div>
        <div class="goals-grid">${goalsHTML}</div>
    </div>
    <div class="slide-counter">${idx} / ${total}</div>`;
}

// ════════════════════════════════════════════════════════════════
//  RENDER DASHBOARD
// ════════════════════════════════════════════════════════════════
function renderDashboard(departments) {
    const container = document.getElementById('slides-container');
    const dotsEl    = document.getElementById('nav-dots');
    container.innerHTML = '';
    dotsEl.innerHTML    = '';

    // Slides 1–N — Departments
    departments.forEach((dept, i) => {
        const s = document.createElement('div');
        s.className = 'slide dept-slide';
        s.id = `slide-dept-${i}`;
        s.innerHTML = buildDeptSlide(dept, i + 1, departments.length);
        container.appendChild(s);
        addDot(dotsEl, i);
    });

    buildTicker(departments);
    startRotation(departments.length);
}

function addDot(parent, idx) {
    const d = document.createElement('div');
    d.className = 'dot';
    d.dataset.idx = idx;
    d.onclick = () => goToSlide(idx);
    parent.appendChild(d);
}

// ════════════════════════════════════════════════════════════════
//  SLIDE ROTATION
// ════════════════════════════════════════════════════════════════
let currentSlide = 0;
let totalSlides  = 0;
let rotationTimer;

function goToSlide(n) {
    const slides = document.querySelectorAll('.slide');
    const dots   = document.querySelectorAll('.dot');

    slides.forEach((s, i) => s.classList.toggle('active', i === n));
    dots.forEach((d, i)   => d.classList.toggle('active', i === n));
    currentSlide = n;
}

function startRotation(count) {
    totalSlides = count;
    clearInterval(rotationTimer);
    goToSlide(0);
    rotationTimer = setInterval(() => {
        goToSlide((currentSlide + 1) % totalSlides);
    }, CONFIG.slideIntervalMs);
}

// ════════════════════════════════════════════════════════════════
//  TICKER
// ════════════════════════════════════════════════════════════════
function buildTicker(departments) {
    const items = departments.map(d => `${d.name}: ${d.goals.filter(g=>g.status==='On Track'||g.status==='Completed').length}/3 on track`);

    const inner = document.getElementById('ticker-inner');
    const all = [...items, ...items];
    inner.innerHTML = all.map(t =>
        `<span class="ticker-item">◆ ${t}</span>`
    ).join('');
}

// ════════════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════════════
renderDashboard(DEMO_DATA);
</script>
</body>
</html>
